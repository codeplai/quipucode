upstream domserver_backend {
    server domserver:80;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name quipucode.lat www.quipucode.lat;
    return 301 https://$host$request_uri;
}

# ── HTTPS — dominio principal quipucode.lat ───────────────────────────
server {
    listen 443 ssl http2;
    server_name quipucode.lat www.quipucode.lat;

    ssl_certificate     /etc/letsencrypt/live/quipucode.lat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quipucode.lat/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 256M;

    # Evita que el upstream comprima la respuesta (necesario para sub_filter)
    proxy_set_header Accept-Encoding "";

    # CSS del tema QuipuCode servido directamente por nginx
    location = /quipucode-theme.css {
        alias /usr/share/nginx/html/quipucode-theme.css;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass         http://domserver_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_read_timeout 300;

        # ── Esencia QuipuCode ─────────────────────────────────────────
        sub_filter_once  off;
        sub_filter_types text/html;
        sub_filter 'DOMjudge'  'QuipuCode';
        sub_filter 'Domjudge'  'QuipuCode';
        sub_filter 'domjudge'  'quipucode';
        sub_filter '</head>' '<link rel="stylesheet" href="/quipucode-theme.css"></head>';
    }
}

# ── Puerto 12345 — acceso de depuración sin SSL ni branding ───────────
server {
    listen 12345;
    server_name _;

    client_max_body_size 256M;

    location / {
        proxy_pass         http://domserver_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 300;
    }
}
