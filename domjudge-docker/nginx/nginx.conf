upstream domserver_backend {
    server domserver:80;
}

# Puerto 80 — dominio principal quipucode.xyz
server {
    listen 80;
    server_name quipucode.xyz www.quipucode.xyz _;

    client_max_body_size 256M;

    # Evita que el upstream comprima la respuesta (necesario para sub_filter)
    proxy_set_header Accept-Encoding "";

    # CSS del tema QuipuCode servido directamente por nginx
    location = /quipucode-theme.css {
        alias /usr/share/nginx/html/quipucode-theme.css;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass         http://domserver_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300;

        # ── Esencia QuipuCode ─────────────────────────────────────────
        # Reemplaza el nombre en toda la interfaz
        sub_filter_once  off;
        sub_filter_types text/html;
        sub_filter 'DOMjudge'  'QuipuCode';
        sub_filter 'Domjudge'  'QuipuCode';
        sub_filter 'domjudge'  'quipucode';
        # Inyecta el tema Inca justo antes de cerrar <head>
        sub_filter '</head>' '<link rel="stylesheet" href="/quipucode-theme.css"></head>';
    }
}

# Puerto 12345 — acceso de depuración sin transformaciones
server {
    listen 12345;
    server_name _;

    client_max_body_size 256M;

    location / {
        proxy_pass         http://domserver_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 300;
    }
}
